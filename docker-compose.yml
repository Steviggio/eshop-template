services:
  api-gateway:
    build:
      context: .
      dockerfile: ./apps/api-gateway/Dockerfile
    container_name: eshop-api
    ports:
      - "4000:4000"
    env_file:
      - ./apps/api-gateway/.env
    volumes:
      - .:/app
      - /app/apps/api-gateway/node_modules
      - /app/node_modules
    environment:
      - PORT=4000
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/eshop
    command: pnpm --filter api-gateway dev
    depends_on:
      - redis
      - postgres

  postgres:
    image: postgres:16-alpine
    container_name: eshop-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eshop
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: eshop-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: